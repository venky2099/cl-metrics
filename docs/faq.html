const FAQS = [
  { cat: "basics",
    en_q: "What is cl-metrics?",
    en_a: `<p>cl-metrics is a stateless Python library that computes Continual Learning and Class-Incremental Learning evaluation metrics from a raw accuracy matrix. You give it a numpy array, it gives you AA, BWT, FWT, Intransigence, Plasticity, Stability, and Forgetting — instantly, with no framework dependency.</p>`,
    zh_q: "cl-metrics 是什么？",
    zh_a: `<p>cl-metrics 是一个无状态的 Python 库，能够从原始精度矩阵中计算持续学习（CL）和类增量学习（CIL）的评估指标。您只需传入一个 numpy 数组，即可立即获得 AA、BWT、FWT、不可塑性、可塑性指数、稳定性指数和遗忘度——无需任何框架依赖。</p>` },

  { cat: "basics",
    en_q: "Why does this exist? Can't I just use Avalanche or PyCIL?",
    en_a: `<p>Avalanche and PyCIL are training frameworks. Their metrics live inside their training loops — you can't pass a raw numpy matrix and get numbers back. If you trained on a custom stack, SNN chip, JAX, TensorFlow, or anything non-PyTorch, you'd need to write wrapper code just to compute a mean. cl-metrics is the tool that was always missing: pure computation, no framework required.</p>`,
    zh_q: "为什么需要这个库？直接用 Avalanche 或 PyCIL 不行吗？",
    zh_a: `<p>Avalanche 和 PyCIL 是完整的训练框架，其指标计算深度耦合在训练循环内部。您无法直接传入一个 numpy 矩阵并获得结果。如果您使用自定义训练栈、脉冲神经网络芯片、JAX、TensorFlow 或任何非 PyTorch 环境，就需要编写大量封装代码才能计算一个简单的均值。cl-metrics 正是社区一直缺少的工具：纯粹的数学计算，无需任何框架。</p>` },

  { cat: "basics",
    en_q: "What does 'stateless' mean?",
    en_a: `<p>Stateless means the library holds no training state, no model, no data loader. Every function is a pure mathematical transformation. You call it, it computes, it returns. Nothing persists between calls. This is exactly what scikit-learn.metrics does for classification — cl-metrics does the same for continual learning.</p>`,
    zh_q: "「无状态」是什么意思？",
    zh_a: `<p>无状态意味着该库不保存任何训练状态、模型权重或数据加载器。每个函数都是纯粹的数学变换：您调用它，它计算，然后返回结果，调用之间不保留任何信息。这与 scikit-learn.metrics 对分类任务的处理方式完全相同——cl-metrics 为持续学习提供了同样的体验。</p>` },

  { cat: "basics",
    en_q: "Who is this for?",
    en_a: `<p>Any researcher working on Continual Learning or Class-Incremental Learning who needs clean, reproducible metrics. Especially useful if you: use a custom training loop, work with SNNs or neuromorphic hardware, use JAX or TensorFlow, want metrics that match the original published formulations, or just don't want to write NumPy scripts for every paper.</p>`,
    zh_q: "这个库适合谁使用？",
    zh_a: `<p>适合所有从事持续学习或类增量学习研究、需要清晰可复现指标的研究人员。尤其适用于以下情况：使用自定义训练循环、使用脉冲神经网络或神经形态硬件、使用 JAX 或 TensorFlow、希望指标与原始论文的公式完全一致，或者不想为每篇论文重复编写 NumPy 脚本。</p>` },

  { cat: "basics",
    en_q: "What does the accuracy matrix look like exactly?",
    en_a: `<p>An N×N matrix where R[i, j] = accuracy on task j evaluated after training on task i.</p><pre>         Task 0   Task 1   Task 2
After 0 [ 0.90    0.00     0.00  ]
After 1 [ 0.72    0.85     0.00  ]
After 2 [ 0.65    0.78     0.88  ]</pre><p>Lower triangle = retention. Upper triangle = zero-shot transfer. Values must be in [0, 1] — not percentages.</p>`,
    zh_q: "精度矩阵的格式是什么？",
    zh_a: `<p>一个 N×N 的矩阵，其中 R[i, j] 表示在完成任务 i 的训练后，模型在任务 j 上的精度。</p><pre>         任务0    任务1    任务2
完成0后 [ 0.90    0.00     0.00  ]
完成1后 [ 0.72    0.85     0.00  ]
完成2后 [ 0.65    0.78     0.88  ]</pre><p>下三角 = 知识保留能力。上三角 = 零样本迁移能力。数值必须在 [0, 1] 范围内——不是百分比形式。</p>` },

  { cat: "install",
    en_q: "How do I install cl-metrics?",
    en_a: `<pre>pip install cl-metrics</pre><p>Only dependency is numpy. No PyTorch, no CUDA, no heavy frameworks.</p>`,
    zh_q: "如何安装 cl-metrics？",
    zh_a: `<pre>pip install cl-metrics</pre><p>唯一的依赖项是 numpy。无需 PyTorch、CUDA 或任何重型框架。</p>` },

  { cat: "install",

    zh_q: "支持哪些 Python 版本？",
    zh_a: `<p>支持 Python 3.8 及以上版本，已在 3.11 上测试。兼容 Windows、Linux 和 macOS。</p>` },

  { cat: "install",

    zh_q: "有哪些依赖项？",
    zh_a: `<p>仅依赖 <code>numpy >= 1.21.0</code>，这就是全部的依赖树。安装包大小约为 2MB。</p>` },

  { cat: "install",
    en_q: "Can I install from source?",
    en_a: `<pre>git clone https://github.com/venky2099/cl-metrics

    zh_q: "可以从源码安装吗？",

  { cat: "install",
    en_q: "How do I run the tests?",

  { cat: "usage",
    en_q: "How do I compute all metrics at once?",
    en_a: `<pre>import numpy as np
from cl_metrics import CLMetrics

R = np.array([
    [0.90, 0.00, 0.00],

results = m.summary()</pre>`,
    zh_q: "如何一次性计算所有指标？",
    zh_a: `<pre>import numpy as np
from cl_metrics import CLMetrics

R = np.array([
    [0.90, 0.00, 0.00],
    [0.72, 0.85, 0.00],
    [0.65, 0.78, 0.88],
])

results = m.summary()</pre>` },

  { cat: "usage",
    en_q: "How do I compute a single metric?",
    en_a: `<pre>m = CLMetrics(R)
aa  = m.average_accuracy()
bwt = m.backward_transfer()
fwt = m.forward_transfer()
pi  = m.plasticity_index()
si  = m.stability_index()
fm  = m.forgetting_measure()</pre>`,
    zh_q: "如何单独计算某个指标？",
    zh_a: `<pre>m = CLMetrics(R)
aa  = m.average_accuracy()   # 平均精度
bwt = m.backward_transfer()  # 反向迁移
fwt = m.forward_transfer()   # 正向迁移
pi  = m.plasticity_index()   # 可塑性指数
si  = m.stability_index()    # 稳定性指数
fm  = m.forgetting_measure() # 遗忘度</pre>` },

  { cat: "usage",
    en_q: "My values are in percentages (0–100), not fractions (0–1). What do I do?",
    en_a: `<pre>R_percent = np.array([[90, 0, 0], [72, 85, 0], [65, 78, 88]])
R = R_percent / 100.0
m = CLMetrics(R)</pre>`,
    zh_q: "我的精度值是百分比形式（0–100），不是小数（0–1），怎么处理？",
    zh_a: `<pre>R_percent = np.array([[90, 0, 0], [72, 85, 0], [65, 78, 88]])
R = R_percent / 100.0  # 除以100转换为小数
m = CLMetrics(R)</pre>` },

  { cat: "usage",
    en_q: "Can I weight tasks by number of classes?",
    en_a: `<pre>weights = np.array([10, 20, 10])
m = CLMetrics(R, task_weights=weights)</pre>`,
    zh_q: "可以按类别数量对任务加权吗？",
    zh_a: `<pre>weights = np.array([10, 20, 10])  # 每个任务的类别数
m = CLMetrics(R, task_weights=weights)</pre><p>传入 task_weights 可按类别数量进行微平均，而非按任务数量进行宏平均。</p>` },

  { cat: "usage",
    en_q: "What if I only have one task?",
    en_a: `<p>Supported. BWT and FWT return 0.0 (mathematically correct). AA returns the single diagonal value.</p>`,
    zh_q: "如果只有一个任务怎么办？",
    zh_a: `<p>完全支持。BWT 和 FWT 将返回 0.0（数学上正确）。AA 返回矩阵唯一的对角线值。</p>` },

  { cat: "usage",
    en_q: "Can I use this with JAX, TensorFlow, or other frameworks?",
    en_a: `<pre>import jax.numpy as jnp
R_jax = jnp.array(...)
R_np  = np.array(R_jax)
m = CLMetrics(R_np)</pre>`,
    zh_q: "可以与 JAX、TensorFlow 或其他框架一起使用吗？",
    zh_a: `<pre>import jax.numpy as jnp
R_jax = jnp.array(...)
R_np  = np.array(R_jax)  # 先转换为 numpy
m = CLMetrics(R_np)</pre><p>这正是 cl-metrics 的设计目标——只需要一个 numpy 数组，框架无关。</p>` },

  { cat: "metrics",
    en_q: "What is Average Accuracy (AA)?",
    en_a: `<p>The weighted mean of final accuracy across all tasks after training is complete. For macro-averaging: AA = mean(R[N-1, :]). Reference: Lopez-Paz & Ranzato (2017).</p>`,
    zh_q: "什么是平均精度（AA）？",
    zh_a: `<p>所有任务训练完成后最终精度的加权均值。宏平均公式：AA = mean(R[N-1, :])。这提供了模型最终状态的整体快照。参考文献：Lopez-Paz & Ranzato (2017)。</p>` },

  { cat: "metrics",
    en_q: "What is Backward Transfer (BWT)?",
    en_a: `<p>Measures how much learning new tasks changes performance on previously learned tasks. BWT = mean(R[N-1, j] - R[j, j]). Negative BWT = forgetting. Reference: Díaz-Rodríguez et al. (2018).</p>`,
    zh_q: "什么是反向迁移（BWT）？",
    zh_a: `<p>衡量学习新任务对已学习任务性能的影响。BWT = mean(R[N-1, j] - R[j, j])。负值表示发生了灾难性遗忘，正值表示新任务的学习反而改善了旧任务的表现（罕见）。参考文献：Díaz-Rodríguez et al. (2018)。</p>` },

  { cat: "metrics",
    en_q: "What is Forward Transfer (FWT)?",
    en_a: `<p>Measures zero-shot performance on future tasks. FWT = mean(R[j-1, j]) for j in 1..N-1. Reference: Díaz-Rodríguez et al. (2018).</p>`,
    zh_q: "什么是正向迁移（FWT）？",
    zh_a: `<p>衡量先前学习对未来任务的零样本性能影响。FWT = mean(R[j-1, j])，j 从 1 到 N-1。正值表示先验知识有助于未来任务的学习。参考文献：Díaz-Rodríguez et al. (2018)。</p>` },

  { cat: "metrics",
    en_q: "What is Intransigence?",
    en_a: `<p>Measures the model's resistance to learning new tasks — the gap between the continual learner and an isolated oracle. Returns 0.0 if no oracle provided. Reference: Díaz-Rodríguez et al. (2018).</p>`,
    zh_q: "什么是不可塑性（Intransigence）？",
    zh_a: `<p>衡量模型对学习新任务的抵抗力——持续学习模型与仅在单任务上训练的基准模型之间的精度差距。若未提供基准精度则返回 0.0。参考文献：Díaz-Rodríguez et al. (2018)。</p>` },

  { cat: "metrics",
    en_q: "How do I compute Intransigence with oracle accuracies?",
    en_a: `<pre>oracle = np.array([0.92, 0.89, 0.91])
m = CLMetrics(R)
i = m.intransigence(reference_accuracies=oracle)</pre>`,
    zh_q: "如何使用基准精度计算不可塑性？",
    zh_a: `<pre>oracle = np.array([0.92, 0.89, 0.91])  # 每个任务的单独训练精度
m = CLMetrics(R)
i = m.intransigence(reference_accuracies=oracle)</pre>` },

  { cat: "metrics",
    en_q: "What is the Plasticity Index?",
    en_a: `<p>Mean of the diagonal — how well the model learns each new task at training time. PI = mean(diag(R)). Reference: Serra et al. (2018).</p>`,
    zh_q: "什么是可塑性指数？",
    zh_a: `<p>矩阵对角线的均值——衡量模型在训练时学习每个新任务的能力。PI = mean(diag(R))。高可塑性意味着模型能快速学习新任务，但可能伴随更高的遗忘风险。参考文献：Serra et al. (2018)。</p>` },

  { cat: "metrics",
    en_q: "What is the Stability Index?",
    en_a: `<p>Mean retention ratio across all tasks. For each task j: retention = R[N-1, j] / R[j, j], clamped to [0, 1]. Reference: Serra et al. (2018).</p>`,
    zh_q: "什么是稳定性指数？",
    zh_a: `<p>所有任务的平均知识保留率。对每个任务 j：保留率 = R[N-1, j] / R[j, j]，截断至 [0, 1]。高稳定性表示模型能很好地保留旧知识。参考文献：Serra et al. (2018)。</p>` },

  { cat: "metrics",
    en_q: "What is the Forgetting Measure?",
    en_a: `<p>For each past task, the maximum accuracy drop at any point after initial learning. Captures worst-case forgetting. Reference: Chaudhry et al. (2018).</p>`,
    zh_q: "什么是遗忘度？",
    zh_a: `<p>对于每个已学习的任务，衡量其在初始学习之后任何时间点出现的最大精度下降。捕捉最坏情况下的遗忘程度，而非仅看最终状态。参考文献：Chaudhry et al. (2018)。</p>` },

  { cat: "metrics",
    en_q: "Why do I get different BWT numbers from other papers?",
    en_a: `<p>The CIL field has a reproducibility crisis — different papers use different BWT formulations. cl-metrics implements the strict Díaz-Rodríguez (2018) formulation. This is exactly why cl-metrics exists.</p>`,
    zh_q: "为什么我计算的 BWT 数值与其他论文不同？",
    zh_a: `<p>CIL 领域存在一场广为人知的可复现性危机——不同论文使用不同的 BWT 计算公式。cl-metrics 严格遵循 Díaz-Rodríguez (2018) 的原始定义。这正是 cl-metrics 诞生的原因。</p>` },

  { cat: "snn",
    en_q: "What are the SNN-specific metrics?",
    en_a: `<p>The first standardised SNN energy-aware CIL evaluation suite: Spike Rate Proxy (SRP), Spike-Rate Normalized Average Accuracy (SR-AA), Energy-Adjusted Backward Transfer (EA-BWT), and Energy-to-Error Ratio (EER).</p>`,
    zh_q: "有哪些脉冲神经网络专属指标？",
    zh_a: `<p>首套标准化的 SNN 能耗感知 CIL 评估指标：脉冲率代理（SRP）、脉冲率归一化平均精度（SR-AA）、能耗调整反向迁移（EA-BWT）和误差能耗比（EER）。</p>` },

  { cat: "snn",
    en_q: "How do I use the SNN metrics?",
    en_a: `<pre>from cl_metrics import SNNMetrics

R = np.array([[0.90,0,0],[0.72,0.85,0],[0.65,0.78,0.88]])

snn.summary()</pre>`,
    zh_q: "如何使用 SNN 专属指标？",
    zh_a: `<pre>from cl_metrics import SNNMetrics

R = np.array([[0.90,0,0],[0.72,0.85,0],[0.65,0.78,0.88]])

let lang = 'en';
let activeTag = 'all';

function setLang(l, btn) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('search').placeholder = l === 'zh' ? '搜索问题...' : 'Search questions...';
  document.getElementById('hTitle').textContent = 'cl-metrics — FAQ';
  document.getElementById('hSub').textContent = l === 'zh' ? '从基础到高级，所有问题一网打尽' : 'Everything you need to know, from basics to advanced usage';
  buildFilters();
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = FAQS.filter(f => {
    const matchCat = activeTag === 'all' || f.cat === activeTag;
    const qText = (lang === 'zh' ? f.zh_q : f.en_q).toLowerCase();
    const aText = (lang === 'zh' ? f.zh_a : f.en_a).toLowerCase();
    const matchQ = !q || qText.includes(q) || aText.includes(q);
    return matchCat && matchQ;
  });
  const countEl = document.getElementById('count');
  countEl.textContent = lang === 'zh'
    ? `共 ${filtered.length} 个问题`
    : `${filtered.length} question${filtered.length !== 1 ? 's' : ''}`;
  const list = document.getElementById('list');
  if (!filtered.length) {
    list.innerHTML = `<div class="none">${lang === 'zh' ? '未找到匹配的问题。' : 'No questions match your search.'}</div>`;
    return;
  }
  list.innerHTML = filtered.map((f, i) => `
    <div class="faq-item">
      <div class="faq-q" onclick="toggle(${i})">
        <div class="q-left">
          <div class="cat-dot" style="background:${CATS[f.cat].color}"></div>
          <span class="q-text">${lang === 'zh' ? f.zh_q : f.en_q}</span>
        </div>
        <span class="arrow" id="arr${i}">▼</span>
      </div>
      <div class="faq-a" id="ans${i}">${lang === 'zh' ? f.zh_a : f.en_a}</div>
    </div>
  `).join('');
}

function toggle(i) {
  const a = document.getElementById('ans' + i);
  const arr = document.getElementById('arr' + i);
  const isOpen = a.classList.contains('open');
  document.querySelectorAll('.faq-a').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.arrow').forEach(el => el.classList.remove('open'));
  if (!isOpen) { a.classList.add('open'); arr.classList.add('open'); }
}

function buildFilters() {
  const f = document.getElementById('filters');
  f.innerHTML = '';
  const all = document.createElement('div');
  all.className = 'tag' + (activeTag === 'all' ? ' active' : '');
  all.textContent = lang === 'zh' ? '全部' : 'All';
  all.onclick = () => setTag('all', all);
  f.appendChild(all);
  Object.entries(CATS).forEach(([key, val]) => {
    const t = document.createElement('div');
    t.className = 'tag' + (activeTag === key ? ' active' : '');
    t.innerHTML = `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${val.color};margin-right:5px;vertical-align:middle"></span>${lang === 'zh' ? val.zh : val.en}`;
    t.onclick = () => setTag(key, t);
    f.appendChild(t);
  });
}

function setTag(key, el) {
  activeTag = key;
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

buildFilters();
render();
</script>
